{{- if .Values.rbac.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ template "app.fullname" . }}
  annotations:
    "helm.sh/resource-policy": "keep"
{{- end }}
---
{{- if .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ template "app.fullname" . }}
  annotations:
    "helm.sh/resource-policy": "keep"
rules:
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "create", "update", "patch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "patch"]
{{- end }}
---
{{- if .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ template "app.fullname" . }}
  annotations:
    "helm.sh/resource-policy": "keep"
subjects:
  - kind: ServiceAccount
    name: {{ template "app.fullname" . }}
roleRef:
  kind: Role
  name: {{ template "app.fullname" . }}
  apiGroup: rbac.authorization.k8s.io
{{- end }}