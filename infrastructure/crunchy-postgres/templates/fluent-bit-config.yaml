apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-fluent-bit-config
  labels: {{ include "crunchy-postgres.labels" . | nindent 4 }}
data:
  fluent-bit.conf: |
    [SERVICE]
        Flush         1
        Log_Level     info
        Parsers_File  parsers.conf
        Log_File      /dev/stdout
    [INPUT]
        Name              tail
        Tag               postgres.logs
        Path              /pgdata/*/log/postgresql*.log
        DB                /pgdata/fluent-bit.db
        Read_from_Head    True
        multiline.parser  multiline-postgres
    [FILTER]
        Name              grep
        Match             postgres.logs
        Regex             log /ERROR:/i
    [OUTPUT]
        Name    file
        Match   postgres.logs
        Path    /dev
        File    stderr
        Format  plain
  parsers.conf: |
    [MULTILINE_PARSER]
        name          multiline-postgres
        type          regex
        flush_timeout 1000
        rule          "start_state"   "/^[^\s]/"  "cont"
        rule          "cont"          "/^[\s]+/"  "cont"
