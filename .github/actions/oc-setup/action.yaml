name: 'OC Login Setup'
description: 'Installs oc CLI, and logs into an OpenShift cluster'

inputs:
  server:
    required: true
    description: OpenShift server URL
  token:
    required: true
    description: OpenShift auth token
  namespace:
    required: true
    description: OpenShift project/namespace

runs:
  using: composite
  steps:
    - name: Cache oc CLI
      id: cache-oc
      uses: actions/cache@v5
      with:
        path: /usr/local/bin/oc
        key: oc-cli-stable-${{ runner.os }}

    - name: Install oc CLI
      if: steps.cache-oc.outputs.cache-hit != 'true'
      shell: bash
      run: |
        curl -sL https://mirror.openshift.com/pub/openshift-v4/clients/ocp/stable/openshift-client-linux.tar.gz \
          | tar -xz -C /usr/local/bin oc

    - name: Authenticate and set project
      shell: bash
      run: |
        attempt=1
        max_attempts=3

        until [ $attempt -gt $max_attempts ]
        do
          echo "Attempt $attempt of $max_attempts..."

          if oc login --server=${{ inputs.server }} --token=${{ inputs.token }} \
            && oc project ${{ inputs.namespace }}; then
            echo "Login successful"
            break
          fi

          if [ $attempt -eq $max_attempts ]; then
            echo "All attempts failed"
            exit 1
          fi

          echo "Login failed. Retrying in 30 seconds..."
          sleep 30

          attempt=$((attempt+1))
        done